<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>병원 매출분석</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&family=DM+Mono:wght@400;500&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f5f4f0;--surface:#fff;--surface2:#f0efe9;--border:rgba(0,0,0,0.08);
  --text:#1a1917;--text2:#6b6a66;--text3:#a09f9a;
  --up:#1d7a5a;--down:#c0392b;
  --radius:10px;--radius-lg:16px;
}
body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:14px}

header{background:var(--surface);border-bottom:1px solid var(--border);padding:14px 26px;display:flex;align-items:center;justify-content:space-between}
.title{font-size:16px;font-weight:700;letter-spacing:-0.02em}
.sub{font-size:11px;color:var(--text2);margin-top:2px}
.year-sel{display:flex;gap:4px}
.yr-btn{padding:6px 14px;font-size:13px;font-family:'Noto Sans KR',sans-serif;border:1px solid var(--border);border-radius:20px;background:var(--surface);color:var(--text2);cursor:pointer;transition:all 0.14s}
.yr-btn:hover{background:var(--surface2)}
.yr-btn.active{background:var(--text);color:#fff;border-color:var(--text);font-weight:500}

.main{display:grid;grid-template-columns:1fr 1fr;min-height:calc(100vh - 55px);max-width:1400px;margin:0 auto;width:100%;box-shadow:0 0 0 1px var(--border)}
.main-wrap{background:var(--bg);min-height:calc(100vh - 55px)}
.left{padding:24px 28px;overflow-y:auto}
.right{background:var(--surface);border-left:1px solid var(--border);padding:24px 28px;overflow-y:auto}

/* 2x2 metric cards */
.metrics-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:18px}
.metric{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px}
.metric-label{font-size:11px;color:var(--text2);margin-bottom:5px;font-weight:500;letter-spacing:0.02em}
.metric-val{display:flex;align-items:baseline;gap:0;line-height:1}
.metric-num{font-family:'DM Mono',monospace;font-size:22px;font-weight:500;color:var(--text)}
.metric-unit{font-size:10px;color:var(--text3);margin-left:1px;font-family:'Noto Sans KR',sans-serif}

/* mobile tab bar — hidden on PC */
.mobile-tabs{display:none}

@media (max-width: 900px) {
  .mobile-tabs{
    display:flex;background:var(--surface);border-bottom:1px solid var(--border);
  }
  .mob-tab{
    flex:1;padding:12px 8px;font-size:13px;font-family:'Noto Sans KR',sans-serif;
    font-weight:500;border:none;background:none;color:var(--text2);cursor:pointer;
    border-bottom:2px solid transparent;transition:all 0.14s;
  }
  .mob-tab.active{color:var(--text);border-bottom-color:var(--text)}
  .main{grid-template-columns:1fr;grid-template-rows:auto;max-width:100%;box-shadow:none}
  .left{border-bottom:none;padding:16px 18px}
  .right{border-left:none;border-top:1px solid var(--border);padding:16px 18px}
  [data-tab-panel="right"]{display:none}
  [data-tab-panel="left"]{display:block}
  .main.tab-right [data-tab-panel="right"]{display:block}
  .main.tab-right [data-tab-panel="left"]{display:none}
}

@media (max-width: 640px) {
  header{padding:12px 16px}
  .title{font-size:14px}
  .yr-btn{padding:5px 10px;font-size:12px}
  .left{padding:14px}
  .right{padding:14px}
  .metrics-grid{gap:8px;margin-bottom:14px}
  .metric{padding:11px 12px}
  .metric-num{font-size:18px}
  .chart-wrap{height:160px}
  .month-grid{grid-template-columns:repeat(4,1fr)}
}

/* charts */
.chart-block{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:14px 16px;margin-bottom:12px}
.chart-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:5px;gap:6px}
.chart-title{font-size:13px;font-weight:700}
.chart-ctrl{display:flex;align-items:center;gap:8px}
.chart-legend-row{margin-bottom:10px}
.legend{display:flex;gap:12px;flex-wrap:wrap}
.legend-item{display:flex;align-items:center;gap:4px;font-size:11px;color:var(--text2)}
.legend-dot{width:8px;height:8px;border-radius:2px;flex-shrink:0}
.chart-wrap{position:relative;width:100%;height:190px}
.cy-tabs{display:flex;gap:3px}
.cy-btn{padding:3px 8px;font-size:11px;font-family:'Noto Sans KR',sans-serif;border:1px solid var(--border);border-radius:10px;background:var(--surface2);color:var(--text2);cursor:pointer;transition:all 0.12s}
.cy-btn.active{background:var(--text);color:#fff;border-color:var(--text)}

/* right panel */
.panel-lbl{font-size:10px;font-weight:700;color:var(--text3);letter-spacing:0.06em;text-transform:uppercase;margin-bottom:10px}
.month-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:4px;margin-bottom:12px}
.m-btn{padding:6px 2px;font-size:12px;font-family:'Noto Sans KR',sans-serif;border:1px solid var(--border);border-radius:7px;background:var(--surface);color:var(--text2);cursor:pointer;text-align:center;transition:all 0.12s}
.m-btn:hover{background:var(--surface2)}
.m-btn.active{background:var(--text);color:#fff;border-color:var(--text);font-weight:500}
.m-btn.no-data{opacity:0.3;cursor:default}
.m-btn.forecast{color:var(--text3);border-style:dashed}
.m-btn.forecast.active{background:var(--text);color:#fff;border-style:solid}

.divider{height:1px;background:var(--border);margin:12px 0}

/* summary + action buttons */
.summary-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.summary-title{font-size:12px;font-weight:700;color:var(--text)}
.summary-badges{display:flex;gap:4px}
.sbadge{font-size:10px;padding:2px 8px;border-radius:4px;font-family:'Noto Sans KR',sans-serif;font-weight:500}
.sbadge.actual{background:#eaf3de;color:#3b6d11}
.sbadge.forecast{background:#faeeda;color:#854f0b}

.action-row{display:flex;gap:5px;margin-bottom:12px}
.act-btn{flex:1;padding:7px 6px;font-size:12px;font-family:'Noto Sans KR',sans-serif;border:1px solid var(--border);border-radius:7px;background:var(--surface);color:var(--text2);cursor:pointer;text-align:center;transition:all 0.12s}
.act-btn:hover{background:var(--surface2);color:var(--text)}
.act-btn.primary{background:var(--text);color:#fff;border-color:var(--text)}
.act-btn.primary:hover{opacity:0.85}
.act-btn.warn{background:#faeeda;color:#854f0b;border-color:#f5c87a}
.act-btn.warn:hover{background:#f5ddb5}

/* result rows */
.res-block{background:var(--surface2);border-radius:var(--radius);padding:10px;margin-bottom:10px}
.res-block-title{font-size:10px;font-weight:700;color:var(--text3);letter-spacing:0.05em;text-transform:uppercase;margin-bottom:8px}
.res-row{display:flex;justify-content:space-between;align-items:center;padding:5px 0;border-bottom:1px solid var(--border)}
.res-row:last-child{border-bottom:none}
.res-label{font-size:12px;color:var(--text2)}
.res-label.indent{padding-left:10px;font-size:11px;color:var(--text3)}
.res-val{font-size:12px;font-weight:500;font-family:'DM Mono',monospace}
.pos{color:var(--up)}.neg{color:var(--down)}
.badge{display:inline-block;font-size:9px;padding:1px 5px;border-radius:3px;background:#e8f0f8;color:#2d5a8e;font-family:'Noto Sans KR',sans-serif}
.badge.g{background:#e0f2ea;color:var(--up)}

/* yoy */
.yoy-block{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:10px;margin-bottom:10px}
.yoy-title{font-size:10px;font-weight:700;color:var(--text3);letter-spacing:0.05em;text-transform:uppercase;margin-bottom:8px}
.yoy-row{display:flex;justify-content:space-between;align-items:center;padding:4px 0;border-bottom:1px solid var(--border)}
.yoy-row:last-child{border-bottom:none}
.yoy-lbl{font-size:12px;color:var(--text2)}
.yoy-vals{display:flex;align-items:center;gap:5px;font-size:11px}
.yoy-prev{color:var(--text3);font-family:'DM Mono',monospace}
.yoy-cur{font-family:'DM Mono',monospace;color:var(--text);font-weight:500}
.yoy-tag{font-size:10px;padding:1px 5px;border-radius:3px;font-family:'Noto Sans KR',sans-serif;font-weight:500}
.yoy-tag.up{background:#e0f2ea;color:var(--up)}.yoy-tag.down{background:#fde8e8;color:var(--down)}.yoy-tag.na{background:var(--surface2);color:var(--text3)}

/* edit form */
.edit-form{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:12px;margin-bottom:10px}
.fg-title{font-size:10px;font-weight:700;color:var(--text3);letter-spacing:0.06em;text-transform:uppercase;margin-bottom:7px;margin-top:10px}
.fg-title:first-child{margin-top:0}
.field-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px}
.field-lbl{font-size:12px;color:var(--text2)}
.field-in{width:130px;padding:5px 8px;font-size:12px;font-family:'DM Mono',monospace;border:1px solid var(--border);border-radius:6px;background:var(--surface);color:var(--text);text-align:right;transition:border-color 0.12s}
.field-in:focus{outline:none;border-color:#2d5a8e}
.field-in.auto{background:var(--surface2);color:var(--text2);font-style:italic}
</style>
</head>
<body>
<!-- 비밀번호 잠금 오버레이 -->
<div id="lock-overlay" style="position:fixed;inset:0;z-index:9999;background:#f5f4f0;display:flex;align-items:center;justify-content:center">

<header>
  <div>

const PW_HASH = 'ed23a362f84e28078430a98e6b191884ce72b3f1cbca16d9ef099d07a939cfb2';

async function sha256(str) {
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str));
  return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
}

async function tryUnlock() {
  const pw = document.getElementById('pw-input').value;
  const hash = await sha256(pw);
  if(hash === PW_HASH) {
    isUnlocked = true;
    document.getElementById('lock-overlay').style.display='none';
    document.getElementById('sample-badge').style.display='none';
    // swap in real data
    Object.assign(RAW, REAL_DATA);
    ['2024','2025'].forEach(yr => deriveYr(yr));
    c26 = RAW['2026'].labels.map((_,i)=>calc26(i));
    refresh26();
    buildMetrics(); buildMonthGrid(); buildCharts(); renderPanel();
  } else {
    document.getElementById('pw-error').style.display='block';
    document.getElementById('pw-input').value='';
    document.getElementById('pw-input').focus();
  }
}

document.addEventListener('keydown', e => {
  if(e.key==='Enter' && document.getElementById('lock-overlay').style.display!=='none') tryUnlock();
});

function deriveYr(yr) {
  const d = RAW[yr];
  d.진료매출 = d.보험청구액.map((v,i) => v!=null&&d.수납액[i]!=null ? v+d.수납액[i] : null);
  d.총매출   = d.진료매출.map((v,i) => v!=null&&d.검진[i]!=null ? v+d.검진[i] : null);
  d.인건비   = d.급여.map((v,i) => {
    const a=v||0, b=d.급여병원부담[i]||0, c=d.퇴직금[i]||0;
    return (v!=null||d.급여병원부담[i]!=null||d.퇴직금[i]!=null) ? a+b+c : null;
  });
  d.총비용 = d.총매출.map((v,i) => v!=null&&d.매출총이익[i]!=null ? v-d.매출총이익[i] : null);
}

// 2026 calc
function calc26(i) {
  const d = RAW['2026'], m = {};
  m.급여 = d.급여[i];
  m.급여병원부담 = d.급여병원부담_saved[i]!==null ? d.급여병원부담_saved[i] : Math.round(m.급여*0.095);
  m.퇴직금 = d.퇴직금_saved[i]!==null ? d.퇴직금_saved[i] : Math.round(m.급여*0.07);
  m.수납액 = d.수납액[i];
  m.병원수익 = d.병원수익_saved[i]!==null ? d.병원수익_saved[i] : Math.round(33700000+(m.수납액-200000000)*0.2);
  m.기공 = d.기공_saved[i]!==null ? d.기공_saved[i] : Math.round(m.수납액*0.1+3000000);
  m.재료 = d.재료_saved[i]!==null ? d.재료_saved[i] : Math.round(m.수납액*0.03+3000000);
  m.오스템덴티움 = d.오스템덴티움[i];
  m.복리후생비 = d.복리후생비[i];
  m.기타비용 = d.기타비용[i];
  m.보험청구액 = d.보험청구액[i];
  m.검진 = d.검진[i];
  m.진료매출 = m.보험청구액+m.수납액;
  m.총매출 = m.진료매출+m.검진;
  m.인건비 = m.급여+m.급여병원부담+m.퇴직금;
  m.총비용 = m.인건비+m.병원수익+m.기공+m.재료+m.오스템덴티움+m.복리후생비+m.기타비용;
  const C3=(m.총매출-110000000)*0.03;
  m.매출총이익 = m.총매출-m.총비용-C3;
  m.C3=C3;
  m.KMR = C3+((m.매출총이익-C3)*0.75+6000000)*0.2;
  m.NET = ((m.매출총이익-C3)*0.75+6000000)*0.8;
  return m;
}

let c26 = RAW['2026'].labels.map((_,i)=>calc26(i));

function refresh26() {
  const d = RAW['2026'];
  d.진료매출   = c26.map(m=>m.진료매출);
  d.총매출     = c26.map(m=>m.총매출);
  d.인건비     = c26.map(m=>m.인건비);
  d.총비용     = c26.map(m=>m.총비용);
  d.매출총이익 = c26.map(m=>m.매출총이익);
  d.NET        = c26.map(m=>m.NET);
  d.KMR        = c26.map(m=>m.KMR);
  d.급여병원부담 = c26.map(m=>m.급여병원부담);
  d.퇴직금     = c26.map(m=>m.퇴직금);
}

function fmtAmt(n) {
  if(n==null) return '-';
  const s=n<0?'-':''; const a=Math.abs(n);
  if(a>=100000000) return s+(a/100000000).toFixed(1).replace(/\.0$/,'')+'억';
  return s+Math.round(a/10000).toLocaleString('ko-KR')+'만';
}
function fmtMetric(n) {
  if(n==null) return {num:'-',suffix:'',unit:''};
  const s=n<0?'-':''; const a=Math.abs(n);
  if(a>=100000000) return {num:s+(a/100000000).toFixed(1).replace(/\.0$/,''),suffix:'억',unit:'원'};
  return {num:s+Math.round(a/10000).toLocaleString('ko-KR'),suffix:'만',unit:'원'};
}
function yoyTag(cur, prev) {
  if(prev==null||cur==null) return '';
  const pct=(cur-prev)/Math.abs(prev)*100;
  const c=pct>=0?'up':'down';
  return `<span class="yoy-tag ${c}">${pct>=0?'▲':'▼'}${pct>=0?'+':''}${pct.toFixed(1)}%</span>`;
}
function prevData(yr, key, i) {
  const py = {'2025':'2024','2026':'2025'}[yr];

  return RAW[py][key]?.[i] ?? null;

        if(cur==null&&prev==null) return '';
        const labelHtml=l.includes('\n')
          ?l.split('\n').map(t=>`<span style="display:block;line-height:1.3">${t}</span>`).join('')
          :l;
        return `<div class="yoy-row"><span class="yoy-lbl">${labelHtml}</span>
          <div class="yoy-vals">
            <span class="yoy-prev">${fmtAmt(prev)}</span>
            <span style="color:var(--text3)">→</span>
            <span class="yoy-cur">${fmtAmt(cur)}</span>
            ${yoyTag(cur,prev)}
          </div></div>`;
      }).join('');
      if(yoyRows.trim()){
        html+=`<div class="yoy-block"><div class="yoy-title">전년 동기 대비 (${prevLabel})</div>${yoyRows}</div>`;
      }
    }
  }

  // ── Detail (everything) ───────────────────────────────────────────────────
  if(mode==='detail'){
    html+=`<div class="res-block">
      <div class="res-block-title">매출</div>
      ${rr('보험(청구액)',get('보험청구액'))}
      ${rr('수납액',get('수납액'))}
      ${rr('진료매출',진료,true)}
      ${rr('검진매출',get('검진'))}
      ${rr('총매출',총매,true)}
    </div>`;

    html+=`<div class="res-block">
      <div class="res-block-title">인건비</div>
      <div class="res-row"><span class="res-label indent">급여(기본+성과)</span><span class="res-val">${fmtAmt(급여v)}</span></div>
      <div class="res-row"><span class="res-label indent">급여병원부담(4대보험)</span><span class="res-val">${fmtAmt(급병v)}</span></div>
      <div class="res-row"><span class="res-label indent">퇴직금</span><span class="res-val">${fmtAmt(퇴직v)}</span></div>
      ${rr('인건비 합계',인건,true)}
    </div>`;

    if(yr==='2026'){
      html+=`<div class="res-block">
        <div class="res-block-title">기타비용</div>
        ${rr('변동임대료+관리비',c26[i].병원수익)}
        ${rr('기공',c26[i].기공)}
        ${rr('재료',c26[i].재료)}
        ${rr('오스템덴티움',c26[i].오스템덴티움)}
        ${rr('복리후생비',c26[i].복리후생비)}
        ${rr('기타비용',c26[i].기타비용)}
      </div>`;
    }

    html+=`<div class="res-block">
      <div class="res-block-title">수익</div>
      ${rr('총비용',총비)}
      ${rr('매출총이익',이익,true,이익!=null&&이익<0)}
      ${rr('NET',netv,true)}`;
    if(yr==='2026') html+=rr('KMR',c26[i].KMR);
    html+=`</div>`;

    // YoY in detail too
    if(pd){
      const yoyKeys=[
        {k:'총매출',l:'총매출',cur:총매},
        {k:'인건비',l:'인건비',cur:인건},
        {k:'매출총이익',l:'매출\n총이익',cur:이익},
        {k:'NET',l:'NET',cur:netv},
      ];
      const prevLabel=`${prevYr}년 ${d.labels[i]}`;
      const yoyRows=yoyKeys.map(({k,l,cur})=>{
        const prev=pd[k]?.[i]??null;
        if(cur==null&&prev==null) return '';
        const labelHtml=l.includes('\n')
          ?l.split('\n').map(t=>`<span style="display:block;line-height:1.3">${t}</span>`).join('')
          :l;
        return `<div class="yoy-row"><span class="yoy-lbl">${labelHtml}</span>
          <div class="yoy-vals">
            <span class="yoy-prev">${fmtAmt(prev)}</span>
            <span style="color:var(--text3)">→</span>
            <span class="yoy-cur">${fmtAmt(cur)}</span>
            ${yoyTag(cur,prev)}
          </div></div>`;
      }).join('');
      if(yoyRows.trim()){
        html+=`<div class="yoy-block"><div class="yoy-title">전년 동기 대비 (${prevLabel})</div>${yoyRows}</div>`;
      }
    }
  }

  // ── Edit form ─────────────────────────────────────────────────────────────
  if(mode==='edit'){
    html+=`<div class="edit-form">`;

    if(yr==='2026'){
      const autoF={
        급여병원부담:()=>RAW['2026'].급여병원부담_saved[i]===null,
        퇴직금:()=>RAW['2026'].퇴직금_saved[i]===null,
        기공:()=>RAW['2026'].기공_saved[i]===null,
        재료:()=>RAW['2026'].재료_saved[i]===null,
      };
      const ef=(key,label,raw)=>{
        const isA=autoF[key]&&autoF[key]();
        const val=Math.round(c26[i][key]||0);
        if(isA) return `<div class="field-row"><span class="field-lbl">${label}</span>
          <input class="field-in auto" type="text" readonly value="${val.toLocaleString('ko-KR')}"/></div>`;
        return `<div class="field-row"><span class="field-lbl">${label}</span>
          <input class="field-in" type="number" value="${val}" data-raw="${raw}" data-idx="${i}" onchange="updVal(this)"/></div>`;
      };
      html+=`<div class="fg-title">매출</div>
        ${ef('보험청구액','보험(청구액)','보험청구액')}
        ${ef('수납액','수납액','수납액')}
        ${ef('검진','검진','검진')}
        <div class="fg-title">인건비</div>
        ${ef('급여','급여(기본+성과)','급여')}
        ${ef('급여병원부담','급여병원부담','급여병원부담_saved')}
        ${ef('퇴직금','퇴직금','퇴직금_saved')}
        <div class="fg-title">기타비용</div>
        ${ef('병원수익','변동임대료+관리비','병원수익_saved')}
        ${ef('기공','기공','기공_saved')}
        ${ef('재료','재료','재료_saved')}
        ${ef('오스템덴티움','오스템덴티움','오스템덴티움')}
        ${ef('복리후생비','복리후생비','복리후생비')}
        ${ef('기타비용','기타비용','기타비용')}`;
    } else {
      // 2024/2025: editable fields
      const editableFields2425=[
        {key:'보험청구액',l:'보험(청구액)',arr:'보험청구액'},
        {key:'수납액',l:'수납액',arr:'수납액'},
        {key:'검진',l:'검진',arr:'검진'},
        {key:'급여',l:'급여(기본+성과)',arr:'급여'},
        {key:'급여병원부담',l:'급여병원부담',arr:'급여병원부담'},
        {key:'퇴직금',l:'퇴직금',arr:'퇴직금'},
        {key:'매출총이익',l:'매출총이익',arr:'매출총이익'},
        {key:'NET',l:'NET',arr:'NET'},
      ];
      const groups2425=[
        {t:'매출',ks:['보험청구액','수납액','검진']},
        {t:'인건비',ks:['급여','급여병원부담','퇴직금']},
        {t:'수익',ks:['매출총이익','NET']},
      ];
      for(const g of groups2425){
        html+=`<div class="fg-title">${g.t}</div>`;
        for(const k of g.ks){
          const f=editableFields2425.find(x=>x.key===k);
          const val=d[f.arr]?.[i]??0;
          html+=`<div class="field-row"><span class="field-lbl">${f.l}</span>
            <input class="field-in" type="number" value="${Math.round(val)}" data-yr="${yr}" data-arr="${f.arr}" data-idx="${i}" onchange="updVal2425(this)"/></div>`;
        }
      }
    }
    html+=`</div>`;
  }

  document.getElementById('panel').innerHTML=html;
}

function rr(label,val,bold=false,neg=false,dim=false){
  const cls=neg?'neg':'';
  const fw=bold?'font-weight:500':'';
  const color=dim?'color:var(--text3)':'';
  const indent=dim?'padding-left:10px;font-size:11px':'';
  return `<div class="res-row">
    <span class="res-label" style="${fw};${color};${indent}">${label}</span>
    <span class="res-val ${cls}" style="${fw};${color};${indent};font-family:'DM Mono',monospace">${fmtAmt(val)}</span>
  </div>`;
}

// ─────────────────────────────────────────────────────────────────────────────
// 모드 전환
// ─────────────────────────────────────────────────────────────────────────────
function showMode(mode,i){ setMode(curYear,i,mode); renderPanel(); }
function startEdit(i){ setMode(curYear,i,'edit'); renderPanel(); }
function saveEdit(i){ setMode(curYear,i,'summary'); renderPanel(); }

// ─────────────────────────────────────────────────────────────────────────────
// 값 업데이트
// ─────────────────────────────────────────────────────────────────────────────
function updVal(el){
  const i=parseInt(el.dataset.idx), raw=el.dataset.raw;
  if(!raw) return;
  RAW['2026'][raw][i]=parseFloat(el.value)||0;
  c26[i]=calc26(i); refresh26();
  // re-render results without losing edit mode
  renderPanel();
  buildMetrics();
  if(cySales==='2026'||cyProfit==='2026') buildCharts();
}

function updVal2425(el){
  const i=parseInt(el.dataset.idx), yr=el.dataset.yr, arr=el.dataset.arr;
  if(RAW[yr][arr]) RAW[yr][arr][i]=parseFloat(el.value)||0;
  // re-derive totals
  const d=RAW[yr];
  d.진료매출[i]=d.보험청구액[i]!=null&&d.수납액[i]!=null?d.보험청구액[i]+d.수납액[i]:null;
  d.총매출[i]=d.진료매출[i]!=null&&d.검진[i]!=null?d.진료매출[i]+d.검진[i]:null;
  d.인건비[i]=(d.급여[i]||0)+(d.급여병원부담[i]||0)+(d.퇴직금[i]||0);
  d.총비용[i]=d.총매출[i]!=null&&d.매출총이익[i]!=null?d.총매출[i]-d.매출총이익[i]:null;
  renderPanel(); buildMetrics();
  if(cySales===yr||cyProfit===yr) buildCharts();
}

// ─────────────────────────────────────────────────────────────────────────────
// 연도 전환
// ─────────────────────────────────────────────────────────────────────────────
function switchYear(yr,el){
  curYear=yr;
  selMonth = (yr==='2024' && isUnlocked) ? 9 : 0;
  document.querySelectorAll('.yr-btn').forEach(b=>b.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('hdr-year').textContent=yr;
  buildMetrics(); buildMonthGrid(); renderPanel();
  cySales=yr; cyProfit=yr; buildCharts();
}

// ─────────────────────────────────────────────────────────────────────────────
// 모바일 탭 전환
// ─────────────────────────────────────────────────────────────────────────────
function switchMobTab(side) {
  const main = document.getElementById('main-grid');
  const leftBtn = document.getElementById('mob-tab-left');
  const rightBtn = document.getElementById('mob-tab-right');
  if(side === 'right') {
    main.classList.add('tab-right');
    leftBtn.classList.remove('active');
    rightBtn.classList.add('active');
  } else {
    main.classList.remove('tab-right');
    leftBtn.classList.add('active');
    rightBtn.classList.remove('active');
    // charts may need resize after becoming visible
    setTimeout(() => { if(chartS) chartS.resize(); if(chartP) chartP.resize(); }, 50);
  }
}
buildMetrics(); buildMonthGrid(); buildCharts(); renderPanel();
</script>
</body>
</html>
